{% extends 'base.html' %}
{% block title %}Register — Hostel CMS{% endblock %}

{% block content %}
<div class="form-wrapper">
    <div class="form-card">
        <div class="form-header">
            <div class="form-icon">📝</div>
            <h1>Student Registration</h1>
            <p>Create your account to start filing complaints</p>
        </div>
        <form method="POST" action="{{ url_for('student.register') }}">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Full Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="room_number">Room Number</label>
                    <input type="text" id="room_number" name="room_number" placeholder="e.g. A-101">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" name="phone" placeholder="e.g. 9876543210">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        <div class="form-footer">
            Already have an account? <a href="{{ url_for('student.login') }}">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
