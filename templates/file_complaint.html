{% extends 'base.html' %}
{% block title %}File a Complaint — Hostel CMS{% endblock %}

{% block content %}
<div class="form-wrapper">
    <div class="form-card">
        <div class="form-header">
            <div class="form-icon">📢</div>
            <h1>File a Complaint</h1>
            <p>Describe your issue and submit it to the administration</p>
        </div>
        <form method="POST" action="{{ url_for('student.file_complaint') }}">
            <div class="form-group">
                <label for="title">Complaint Title <span class="required">*</span></label>
                <input type="text" id="title" name="title" placeholder="Give a brief title to your complaint" required>
            </div>
            <div class="form-group">
                <label for="category_id">Category</label>
                <select id="category_id" name="category_id">
                    <option value="">-- Select a Category --</option>
                    {% for cat in categories %}
                        <option value="{{ cat[0] }}">{{ cat[1] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="description">Description <span class="required">*</span></label>
                <textarea id="description" name="description" rows="6"
                    placeholder="Provide a detailed description of your complaint..." required></textarea>
            </div>
            <div class="form-actions">
                <a href="{{ url_for('student.dashboard') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Submit Complaint</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
